<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bushra Tech | Login</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Customized Styling -->
    <link
      rel="stylesheet"
      href="{{ url_for('auth.static', filename='auth_style.css') }}"
    />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <!-- HEADER -->
        <div class="text-center mb-4">
          <h4
            style="font-weight: 900 !important; font-size: 1.89rem !important"
          >
            <i class="bi bi-mortarboard-fill mx-2"></i> Bushra Tech &TRADE;
          </h4>
          <p class="text-muted mb-0">Schools Management System</p>
        </div>
        <hr />

        <!-- FLASH MESSAGES -->
        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %} {% for category, message in messages %}
        <div
          class="alert alert-{{ category }} alert-dismissible fade show"
          role="alert"
        >
          <i class="bi bi-exclamation-triangle-fill"></i>
          {{ message }}
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
          ></button>
        </div>
        {% endfor %} {% endif %} {% endwith %}

        <!-- LOGIN FORM -->
        <form method="POST" action="{{ url_for('auth.login') }}">
          {{ form.hidden_tag() }}

          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-person-fill"></i>
              </span>
              <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter username"
                required
              />
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-lock-fill"></i>
              </span>
              <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter password"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn btn-login w-100">
            <i class="bi bi-box-arrow-in-right"></i> Login
          </button>
        </form>
        <!-- <div class="mt-3">
          <small>Forgot password? Click <a href="#">here.</a></small>
        </div> -->
      </div>
    </div>

    <footer>
      <span
        ><i class="bi bi-code-slash"></i> Developed by Bushra Tech
        &copy;2026</span
      >
      <span>|</span>
      <span><i class="bi bi-telephone-fill"></i> +254 701 948 287</span>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
